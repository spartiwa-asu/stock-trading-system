<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Base</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .navbar-nav {
            display: flex;
            flex-direction: row;
            gap: 10px;
           
        }

        .navbar {
        border-bottom: 40px solid #1E0E80;
        padding: 0 40px
        }

    </style>
</head>

<body>

    <nav class="navbar navbar-light bg-light"> <!--flex box with dark text on a light background-->

        <a class="navbar-brand">Stock Trading System</a> <!--navbar-brand sends the title to the left-->

        <div class="ms-auto"> <!---div container stylled to display items on the right-->
            <ul class="navbar-nav">
                <!--navbar-nav styles the list as a navbar, d-flex and flex-row make sur the list is horizontal-->

                {% if current_user.is_authenticated %}

                <li class="nav-item">
                    <a class="nav-link" href="/portfolio">Portfolio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/market-info">Market info</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/buy-sell">Buy &amp; Sell</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/transaction">Transactions</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/withdraw-deposit">Withdraw/Deposit</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register">Create account</a>
                </li>

                {% endif %}
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-dark text-light mt-5">
    <div class="container py-3"><p class="text-center mb-0">© 2024 My Flask App</p></div>
  </footer>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
